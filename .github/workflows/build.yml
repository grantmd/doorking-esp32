name: build

# Build firmware + run host tests on every push to main and every PR. On
# tag push matching v*, additionally publish a GitHub Release with the
# partition binaries and a merged one-shot flash image.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # softprops/action-gh-release needs write access to create releases.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run host-side unit tests
        run: ./test/run_tests.sh

      - name: Build firmware for esp32c3
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32c3
          path: '.'
          # Build, then merge the partitions into a single image that can be
          # flashed at 0x0 in one shot. The flash_mode / flash_freq /
          # flash_size values match what sdkconfig.defaults asks for.
          command: |
            idf.py build
            python -m esptool --chip esp32c3 merge_bin \
              -o build/doorking-merged.bin \
              --flash_mode dio --flash_freq 80m --flash_size 4MB \
              0x0     build/bootloader/bootloader.bin \
              0x8000  build/partition_table/partition-table.bin \
              0xd000  build/ota_data_initial.bin \
              0x10000 build/doorking.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware-esp32c3
          if-no-files-found: error
          path: |
            build/doorking.bin
            build/doorking.elf
            build/doorking-merged.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/doorking.bin
            build/doorking-merged.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
          body: |
            ## Flashing

            **One-step flash** (recommended — uses the merged image):

            ```
            python -m esptool --chip esp32c3 --port /dev/cu.usbmodem* \
              write_flash 0x0 doorking-merged.bin
            ```

            **Or flash individual partitions:**

            ```
            python -m esptool --chip esp32c3 --port /dev/cu.usbmodem* \
              write_flash \
              0x0     bootloader.bin \
              0x8000  partition-table.bin \
              0xd000  ota_data_initial.bin \
              0x10000 doorking.bin
            ```

            On a fresh device the firmware boots in AP mode — join the open
            `doorking-setup` network and visit `http://192.168.4.1/` to
            provision. See the README for details.
