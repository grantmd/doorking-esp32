name: build

# Build firmware for every supported target on every push to main and every
# PR. Host-side unit tests run once per target (cheap — they take
# milliseconds). On tag push matching v*, a separate release job runs after
# all matrix builds finish and publishes a single GitHub Release with one
# target-tagged merged image per board.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [esp32c3, esp32, esp32c5]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git describe --tags gets the version

      - name: Run host-side unit tests
        run: ./test/run_tests.sh

      - name: Build firmware for ${{ matrix.target }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ matrix.target }}
          path: '.'
          # Build, then produce a merged single-image binary via
          # `idf.py merge-bin`. Using idf.py's own merge subcommand means
          # partition offsets, flash_size, flash_freq, and flash_mode are
          # all read from the build's flasher_args.json — no per-target
          # values need to be hand-maintained in this workflow, and
          # changing the partition table (e.g. TWO_OTA → TWO_OTA_LARGE)
          # automatically flows through without any CI changes. The -o
          # path is relative to build/ because idf.py cd's there before
          # calling esptool.
          command: |
            idf.py build
            idf.py merge-bin -o doorking-${{ matrix.target }}-merged.bin

      - name: Rename app binary for OTA
        run: cp build/doorking.bin build/doorking-${{ matrix.target }}.bin

      - name: Upload firmware artifacts for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.target }}
          if-no-files-found: error
          path: |
            build/doorking.bin
            build/doorking.elf
            build/doorking-${{ matrix.target }}.bin
            build/doorking-${{ matrix.target }}-merged.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin

  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/firmware-esp32c3/doorking-esp32c3.bin
            artifacts/firmware-esp32/doorking-esp32.bin
            artifacts/firmware-esp32c5/doorking-esp32c5.bin
            artifacts/firmware-esp32c3/doorking-esp32c3-merged.bin
            artifacts/firmware-esp32/doorking-esp32-merged.bin
            artifacts/firmware-esp32c5/doorking-esp32c5-merged.bin
          body: |
            ## OTA update

            Devices running v0.5.0+ with OTA support will detect this
            release automatically. Visit `http://doorking.local/` to see
            the available update and install it, or push manually:

            ```
            curl -X POST http://doorking.local/update \
              -H "Authorization: Bearer <token>" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @doorking-<target>.bin
            ```

            ## USB flashing

            Each supported target ships a pre-merged single-image binary.
            Pick the one for your board and flash with `esptool`.

            ### Seeed Studio XIAO ESP32-C3 → `doorking-esp32c3-merged.bin`

            ```
            python -m esptool --chip esp32c3 --port /dev/cu.usbmodem* \
              write_flash 0x0 doorking-esp32c3-merged.bin
            ```

            ### SparkFun Thing Plus ESP32 WROOM (USB-C) → `doorking-esp32-merged.bin`

            ```
            python -m esptool --chip esp32 --port /dev/cu.usbserial-* \
              write_flash 0x1000 doorking-esp32-merged.bin
            ```

            ### SparkFun Thing Plus ESP32-C5 → `doorking-esp32c5-merged.bin`

            ```
            python -m esptool --chip esp32c5 --port /dev/cu.usbmodem* \
              write_flash 0x2000 doorking-esp32c5-merged.bin
            ```

            Note the different flash offsets: the ESP32-C3 flashes at `0x0`,
            the original ESP32 at `0x1000`, and the ESP32-C5 at `0x2000`.
            These are chip boot ROM requirements, not project choices.

            On a fresh device the firmware comes up in AP mode broadcasting
            an open `doorking-setup` SSID. Join it and visit
            `http://192.168.4.1/` to provision the WiFi credentials and
            obtain a bearer token. The token is also logged to the serial
            console as a backup delivery channel. See the README for full
            provisioning details.
